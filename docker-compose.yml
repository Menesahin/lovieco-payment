services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  migrate:
    build: .
    command: npx prisma migrate deploy
    env_file: .env
    restart: "no"

  seed:
    build: .
    command: npx tsx prisma/seed.ts
    env_file: .env
    restart: "no"
    profiles:
      - seed
