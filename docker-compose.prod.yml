services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lovieco-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DEV_MODE: "true"
    ports:
      - '0.0.0.0:3006:3000'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

networks:
  app-network:
    external: true
